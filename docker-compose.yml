version: '3.8'

services:
  # Citus Coordinator
  citus-coordinator:
    image: citusdata/citus:11.2
    container_name: citus-coordinator
    environment: &AUTH
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dialog
    ports:
      - "5436:5432"
    command: >
      postgres 
      -c shared_preload_libraries=citus 
      -c max_connections=200 
      -c citus.node_conninfo="sslmode=prefer user=postgres password=postgres"
    volumes:
      - coordinator_data:/var/lib/postgresql/data
    networks:
      - citus-network

  # Citus Worker 1
  citus-worker-1:
    image: citusdata/citus:11.2
    container_name: citus-worker-1
    environment: *AUTH
    command: postgres -c shared_preload_libraries=citus -c max_connections=200
    volumes:
      - worker1_data:/var/lib/postgresql/data
    networks:
      - citus-network

  # Citus Worker 2
  citus-worker-2:
    image: citusdata/citus:11.2
    container_name: citus-worker-2
    environment: *AUTH
    command: postgres -c shared_preload_libraries=citus -c max_connections=200
    volumes:
      - worker2_data:/var/lib/postgresql/data
    networks:
      - citus-network

  # Citus Worker 3
  citus-worker-3:
    image: citusdata/citus:11.2
    container_name: citus-worker-3
    environment: *AUTH
    command: postgres -c shared_preload_libraries=citus -c max_connections=200
    volumes:
      - worker3_data:/var/lib/postgresql/data
    networks:
      - citus-network

  app-dialog:
    build: .
    container_name: app-dialog
    ports:
      - "8081:8080"
    depends_on:
      - citus-coordinator
      - citus-worker-1
      - citus-worker-2
      - citus-worker-3
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://citus-coordinator:5432/dialog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./logs:/app/logs
    networks:
      - citus-network

networks:
  citus-network:
    driver: bridge

volumes:
  coordinator_data:
  worker1_data:
  worker2_data:
  worker3_data: